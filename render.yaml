# Render Blueprint - TrainingHub Pro
# https://render.com/docs/blueprint-spec
# Production runs in FRANKFURT (co-located with Supabase EU) on Starter plan.
# Deploys are triggered by CI (deploy hooks) — autoDeploy stays off.

services:
  # Frontend Next.js
  - type: web
    name: traininghub-frontend-eu
    runtime: node
    region: frankfurt
    plan: starter
    autoDeploy: false  # Deploys are controlled by CI/CD via deploy hooks
    buildCommand: cd frontend && npm install && NODE_OPTIONS="--max-old-space-size=512" npm run build && cp -r .next/static .next/standalone/.next/static && if [ -d public ]; then cp -r public .next/standalone/public; fi
    startCommand: cd frontend && node .next/standalone/server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false

  # Backend API
  - type: web
    name: traininghub-api-eu
    runtime: python
    region: frankfurt
    plan: starter
    autoDeploy: false  # Deploys are controlled by CI/CD via deploy hooks
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SECRET_KEY
        sync: false  # NEVER regenerate: medical-records encryption derives from it
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SUPERADMIN_EMAILS
        sync: false
    healthCheckPath: /health
