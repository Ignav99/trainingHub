name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# Only one deploy at a time — never cancel in-progress deploys
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    # Only deploy when CI passed — never on failure
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Deploy backend
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" | grep -q "^2" \
            && echo "Backend deploy triggered" \
            || (echo "Backend deploy failed" && exit 1)

      - name: Deploy frontend
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" | grep -q "^2" \
            && echo "Frontend deploy triggered" \
            || (echo "Frontend deploy failed" && exit 1)
