name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# This workflow only calls Render deploy hooks — it needs no repo token access.
permissions: {}

# Only one deploy at a time — never cancel in-progress deploys
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    # Only deploy when CI passed — never on failure
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Deploy backend
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}")
          echo "Backend deploy hook response: $HTTP_CODE"
          if [[ "$HTTP_CODE" =~ ^2 ]]; then
            echo "Backend deploy triggered successfully"
          else
            echo "Backend deploy failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Deploy frontend
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}")
          echo "Frontend deploy hook response: $HTTP_CODE"
          if [[ "$HTTP_CODE" =~ ^2 ]]; then
            echo "Frontend deploy triggered successfully"
          else
            echo "Frontend deploy failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Wait for Render deploy
        run: sleep 90

      - name: Verify Render services
        run: |
          FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://traininghub-frontend-eu.onrender.com/login" || echo "000")
          BACKEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://traininghub-api-eu.onrender.com/" || echo "000")
          echo "Frontend status: $FRONTEND_STATUS"
          echo "Backend status: $BACKEND_STATUS"
          if [[ "$FRONTEND_STATUS" != "200" || "$BACKEND_STATUS" != "200" ]]; then
            echo "One or both services are not healthy after deploy"
            exit 1
          fi
          echo "Both services are healthy"
