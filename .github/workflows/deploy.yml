name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_FRONTEND: ${{ secrets.RENDER_SERVICE_ID_FRONTEND || 'srv-d8lbud6gvqtc73aphqi0' }}
      RENDER_SERVICE_BACKEND: ${{ secrets.RENDER_SERVICE_ID_BACKEND || 'srv-d8lbubeq1p3s73c65mmg' }}

    steps:
      - name: Deploy backend
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}")
          echo "Backend deploy hook response: $HTTP_CODE"
          if [[ "$HTTP_CODE" =~ ^2 ]]; then
            echo "Backend deploy triggered successfully"
          else
            echo "Backend deploy failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Deploy frontend
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}")
          echo "Frontend deploy hook response: $HTTP_CODE"
          if [[ "$HTTP_CODE" =~ ^2 ]]; then
            echo "Frontend deploy triggered successfully"
          else
            echo "Frontend deploy failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Wait for deploys to start
        run: sleep 45

      - name: Poll Render deploy status
        if: env.RENDER_API_KEY != ''
        run: |
          poll_service() {
            local service_id=$1
            local name=$2
            local attempts=30
            local sleep_seconds=30

            for i in $(seq 1 $attempts); do
              local response=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
                "https://api.render.com/v1/services/$service_id/deploys?limit=1")
              local status=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['deploy']['status'])")
              local commit_id=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['deploy']['commit']['id'])")
              echo "[$name] attempt $i/$attempts -> status=$status commit=$commit_id"

              if [[ "$status" == "live" ]]; then
                echo "[$name] deploy is live"
                return 0
              fi

              if [[ "$status" == "build_failed" || "$status" == "update_failed" || "$status" == "canceled" ]]; then
                echo "[$name] deploy failed with status=$status"
                return 1
              fi

              sleep $sleep_seconds
            done

            echo "[$name] deploy did not reach live status within timeout"
            return 1
          }

          poll_service "$RENDER_SERVICE_BACKEND" "backend" || exit 1
          poll_service "$RENDER_SERVICE_FRONTEND" "frontend" || exit 1

      - name: Verify Render services healthy
        run: |
          FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://traininghub-frontend-eu.onrender.com/login" || echo "000")
          BACKEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://traininghub-api-eu.onrender.com/" || echo "000")
          echo "Frontend status: $FRONTEND_STATUS"
          echo "Backend status: $BACKEND_STATUS"
          if [[ "$FRONTEND_STATUS" != "200" || "$BACKEND_STATUS" != "200" ]]; then
            echo "One or both services are not healthy after deploy"
            exit 1
          fi
          echo "Both services are healthy"
