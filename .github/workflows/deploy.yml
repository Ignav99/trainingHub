name: Deploy

on:
  push:
    branches: [main]

# Only one deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    environment: production
    needs: []
    # Deploy only when CI workflow passes on main
    # CI runs in parallel — we use workflow_run for that.
    # Here we trigger via push to main after CI gates merge.
    steps:
      - name: Deploy backend
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" | grep -q "^2" \
            && echo "Backend deploy triggered" \
            || (echo "Backend deploy failed" && exit 1)

      - name: Deploy frontend
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" | grep -q "^2" \
            && echo "Frontend deploy triggered" \
            || (echo "Frontend deploy failed" && exit 1)
