name: Monitor Render Deploy

on:
  workflow_run:
    workflows: [Deploy]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  issues: write

concurrency:
  group: monitor-render
  cancel-in-progress: false

jobs:
  monitor:
    name: Verify Render services are healthy
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Wait for deploy to start
        run: sleep 90

      - name: Poll Render services
        env:
          FRONTEND_URL: https://traininghub-frontend-eu.onrender.com
          BACKEND_URL: https://traininghub-api-eu.onrender.com
        run: |
          MAX_ATTEMPTS=20
          SLEEP_SECONDS=30
          FRONTEND_OK=0
          BACKEND_OK=0

          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $i/$MAX_ATTEMPTS"

            FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$FRONTEND_URL/login" || echo "000")
            BACKEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/health" || echo "000")
            READY_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/ready" || echo "000")

            echo "Frontend: $FRONTEND_STATUS"
            echo "Backend /health: $BACKEND_STATUS"
            echo "Backend /ready: $READY_STATUS"

            if [[ "$FRONTEND_STATUS" == "200" ]]; then FRONTEND_OK=1; fi
            if [[ "$BACKEND_STATUS" == "200" ]]; then BACKEND_OK=1; fi

            if [[ "$FRONTEND_OK" == "1" && "$BACKEND_OK" == "1" ]]; then
              echo "Both services are healthy"
              exit 0
            fi

            sleep $SLEEP_SECONDS
          done

          echo "Render services did not become healthy after polling"
          exit 1

      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          gh issue create \
            --title "Render deploy verification failed" \
            --body "El monitor de Render detectó que uno o ambos servicios no responden correctamente después del deploy.\n\n- Run: $RUN_URL\n- Frontend: https://traininghub-frontend-eu.onrender.com\n- Backend: https://traininghub-api-eu.onrender.com\n\n/cc @Ignav99" \
            --label "bug,deployment"
