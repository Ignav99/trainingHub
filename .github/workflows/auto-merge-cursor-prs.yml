name: Auto-merge Cursor PRs

# Merges cursor/* PRs to main after CI passes so Render deploys automatically.
# Render has autoDeploy: false — production only updates via deploy hooks.
#
# NOTE: merges use GITHUB_TOKEN, so the push to main does NOT re-trigger CI/Deploy
# workflows. Deploy hooks are fired here after a successful merge.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: automerge-cursor-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  automerge:
    name: Merge cursor PR to main
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    outputs:
      merged: ${{ steps.merge.outputs.merged }}

    steps:
      - name: Merge PR when CI passes
        id: merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          echo "merged=false" >> "$GITHUB_OUTPUT"

          if [[ ! "$HEAD_BRANCH" =~ ^cursor/ ]]; then
            echo "Branch $HEAD_BRANCH is not cursor/* — skipping auto-merge"
            exit 0
          fi

          PR_NUM=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "$HEAD_BRANCH" \
            --base main \
            --state open \
            --json number \
            -q '.[0].number // empty')

          if [[ -z "$PR_NUM" ]]; then
            echo "No open PR for branch $HEAD_BRANCH"
            exit 0
          fi

          PR_HEAD_SHA=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json headRefOid -q '.headRefOid')
          if [[ "$PR_HEAD_SHA" != "$HEAD_SHA" ]]; then
            echo "PR #$PR_NUM head ($PR_HEAD_SHA) does not match CI run ($HEAD_SHA) — skipping stale run"
            exit 0
          fi

          IS_DRAFT=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json isDraft -q '.isDraft')
          if [[ "$IS_DRAFT" == "true" ]]; then
            echo "PR #$PR_NUM is draft — marking ready for review"
            gh pr ready "$PR_NUM" --repo "${{ github.repository }}"
          fi

          echo "Merging PR #$PR_NUM ($HEAD_BRANCH) into main"
          gh pr merge "$PR_NUM" \
            --repo "${{ github.repository }}" \
            --merge \
            --delete-branch

          echo "Merged PR #$PR_NUM ($HEAD_BRANCH) into main"
          echo "merged=true" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Render after merge
    needs: automerge
    if: needs.automerge.outputs.merged == 'true'
    runs-on: ubuntu-latest
    # Serialize production deploys — avoid deploy storms that take the API down
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_BACKEND: ${{ secrets.RENDER_SERVICE_ID_BACKEND || 'srv-d8lbubeq1p3s73c65mmg' }}
      RENDER_SERVICE_FRONTEND: ${{ secrets.RENDER_SERVICE_ID_FRONTEND || 'srv-d8lbud6gvqtc73aphqi0' }}

    steps:
      - name: Trigger Render deploy hooks
        run: |
          BACKEND_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}")
          FRONTEND_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}")
          echo "Backend deploy hook: $BACKEND_CODE"
          echo "Frontend deploy hook: $FRONTEND_CODE"
          if [[ ! "$BACKEND_CODE" =~ ^2 || ! "$FRONTEND_CODE" =~ ^2 ]]; then
            echo "Deploy hook failed"
            exit 1
          fi

      - name: Wait for deploy to start
        run: sleep 60

      - name: Poll until API is healthy
        run: |
          MAX_ATTEMPTS=30
          SLEEP_SECONDS=20
          for i in $(seq 1 $MAX_ATTEMPTS); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 8 \
              "https://traininghub-api-eu.onrender.com/health" || echo "000")
            echo "Attempt $i/$MAX_ATTEMPTS health=$CODE"
            if [[ "$CODE" == "200" ]]; then
              echo "API healthy"
              exit 0
            fi
            sleep $SLEEP_SECONDS
          done
          echo "API did not become healthy after deploy"
          exit 1
